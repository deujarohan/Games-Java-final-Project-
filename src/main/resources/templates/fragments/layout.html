<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} ?: 'GameHub'">GameHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="nav-brand" th:href="@{/}">
        <span class="brand-icon">⬡</span> GAME<span class="brand-accent">HUB</span>
    </a>
    <div class="nav-links">
        <a th:href="@{/dashboard}" sec:authorize="isAuthenticated()">Dashboard</a>
        <a th:href="@{/games/ttt}" sec:authorize="isAuthenticated()">Tic-Tac-Toe</a>
        <a th:href="@{/games/rps}" sec:authorize="isAuthenticated()">Rock Paper Scissors</a>
        <a th:href="@{/records}" sec:authorize="isAuthenticated()">Records</a>
        <a th:href="@{/profile}" sec:authorize="isAuthenticated()">Profile</a>
        <a th:href="@{/login}" sec:authorize="isAnonymous()" class="nav-cta">Login</a>
        <a th:href="@{/register}" sec:authorize="isAnonymous()" class="nav-cta secondary">Register</a>
        <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" style="display:inline">
            <button type="submit" class="nav-logout">Logout</button>
        </form>
    </div>
</nav>

<div class="hit-counter" id="hitCounter">
    <span class="hit-label">SERVER HITS</span>
    <span class="hit-value" id="hitValue">—</span>
</div>

<main class="main-content">
    <th:block th:fragment="content"/>
</main>

<footer class="footer">
    <p>GameHub &copy; 2025 &mdash; Entertainment MVC Project</p>
</footer>

<script th:src="@{/js/hits.js}"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
